<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podcast RSS Proxy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <header class="mb-8">
            <h1 class="text-4xl font-bold text-gray-900 mb-2">Podcast RSS Proxy</h1>
            <p class="text-gray-600">Manage and cache your podcast feeds</p>
        </header>

        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">Add New Feed</h2>
            <div class="flex gap-2">
                <input 
                    type="url" 
                    id="feedUrl" 
                    placeholder="Enter RSS feed URL..." 
                    class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
                <button 
                    onclick="addFeed()" 
                    class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition flex items-center gap-2"
                >
                    <i data-lucide="plus" class="w-4 h-4"></i>
                    Add Feed
                </button>
            </div>
        </div>

        <div class="mb-4 flex justify-between items-center">
            <h2 class="text-2xl font-semibold">Your Feeds</h2>
            <div class="flex gap-2">
                <button 
                    onclick="cleanupDatabase()" 
                    class="px-4 py-2 bg-orange-600 text-white rounded-lg hover:bg-orange-700 transition flex items-center gap-2"
                >
                    <i data-lucide="database" class="w-4 h-4"></i>
                    Cleanup DB
                </button>
                <button 
                    onclick="syncAll()" 
                    class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition flex items-center gap-2"
                >
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                    Sync All
                </button>
            </div>
        </div>

        <div id="feedsList" class="space-y-4">
            <div class="text-center py-12 text-gray-500">
                <i data-lucide="rss" class="w-16 h-16 mx-auto mb-4 opacity-50"></i>
                <p>No feeds yet. Add one above to get started!</p>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-4 right-4 bg-gray-900 text-white px-6 py-3 rounded-lg shadow-lg hidden transition-opacity">
        <p id="toastMessage"></p>
    </div>

    <script>
        let feeds = [];
        let baseUrl = window.location.origin;

        async function loadConfig() {
            try {
                const response = await fetch('/api/config');
                const config = await response.json();
                baseUrl = config.base_url;
            } catch (error) {
                console.error('Error loading config:', error);
            }
        }

        async function loadFeeds() {
            try {
                const response = await fetch('/api/feeds');
                feeds = await response.json();
                renderFeeds();
            } catch (error) {
                showToast('Error loading feeds: ' + error.message, 'error');
            }
        }

        async function addFeed() {
            const url = document.getElementById('feedUrl').value.trim();
            if (!url) {
                showToast('Please enter a feed URL', 'error');
                return;
            }

            try {
                const response = await fetch('/api/feeds', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Failed to add feed');
                }

                document.getElementById('feedUrl').value = '';
                showToast('Feed added successfully!', 'success');
                await loadFeeds();
            } catch (error) {
                showToast('Error: ' + error.message, 'error');
            }
        }

        async function deleteFeed(feedId) {
            if (!confirm('Are you sure you want to delete this feed?')) return;

            try {
                await fetch(`/api/feeds/${feedId}`, { method: 'DELETE' });
                showToast('Feed deleted', 'success');
                await loadFeeds();
            } catch (error) {
                showToast('Error deleting feed: ' + error.message, 'error');
            }
        }

        async function syncFeed(feedId) {
            try {
                const response = await fetch(`/api/feeds/${feedId}/sync`, { method: 'POST' });
                const result = await response.json();
                
                if (result.success) {
                    showToast(`Synced ${result.episode_count} episodes`, 'success');
                    await loadFeedDetails(feedId);
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                showToast('Error syncing: ' + error.message, 'error');
            }
        }

        async function cleanupDatabase() {
            try {
                const response = await fetch('/api/cleanup', { method: 'POST' });
                const result = await response.json();
                
                if (result.success) {
                    showToast(`Cleaned ${result.cleaned} of ${result.checked} episodes`, 'success');
                    await loadFeeds();
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                showToast('Error cleaning database: ' + error.message, 'error');
            }
        }

        async function syncAll() {
            try {
                const response = await fetch('/api/sync-all', { method: 'POST' });
                const results = await response.json();
                const successful = results.filter(r => r.success).length;
                showToast(`Synced ${successful} of ${results.length} feeds`, 'success');
                await loadFeeds();
            } catch (error) {
                showToast('Error syncing: ' + error.message, 'error');
            }
        }

        async function loadFeedDetails(feedId) {
            try {
                const response = await fetch(`/api/feeds/${feedId}`);
                const feed = await response.json();
                const index = feeds.findIndex(f => f.id === feedId);
                if (index !== -1) {
                    feeds[index] = feed;
                    renderFeeds();
                }
            } catch (error) {
                console.error('Error loading feed details:', error);
            }
        }

        async function toggleFeed(feedId) {
            const feed = feeds.find(f => f.id === feedId);
            if (!feed.episodes) {
                await loadFeedDetails(feedId);
            } else {
                feed.episodes = null;
                renderFeeds();
            }
        }

        const downloadingEpisodes = new Map();

        async function downloadEpisode(episodeId, feedId) {
            if (downloadingEpisodes.has(episodeId)) return;
            
            downloadingEpisodes.set(episodeId, { 
                progress: 0, 
                feedId,
                startTime: Date.now(),
                hasStarted: false
            });
            
            // Update button to show initial progress without full re-render
            const downloadButton = document.querySelector(`button[onclick="downloadEpisode(${episodeId}, ${feedId})"]`);
            if (downloadButton) {
                downloadButton.outerHTML = `<span class="px-2 py-1 bg-blue-100 text-blue-700 rounded text-xs flex items-center gap-1" data-episode-id="${episodeId}">
                    <svg class="w-4 h-4" viewBox="0 0 36 36">
                        <circle cx="18" cy="18" r="16" fill="none" stroke="currentColor" stroke-width="3" opacity="0.25"></circle>
                        <circle class="progress-circle" cx="18" cy="18" r="16" fill="none" stroke="currentColor" stroke-width="3" 
                            stroke-dasharray="0 100.53"
                            stroke-linecap="round" transform="rotate(-90 18 18)"></circle>
                    </svg>
                    <span class="progress-text">0%</span>
                </span>`;
            }
            
            try {
                const response = await fetch(`/api/episodes/${episodeId}/download`, { method: 'POST' });
                const result = await response.json();
                
                if (!result.success) {
                    throw new Error(result.error);
                }
            } catch (error) {
                downloadingEpisodes.delete(episodeId);
                showToast('Error downloading: ' + error.message, 'error');
                renderFeeds();
            }
        }

        async function playEpisode(episodeId, feedId) {
            // Trigger download with progress tracking, then open episode
            if (!downloadingEpisodes.has(episodeId)) {
                await downloadEpisode(episodeId, feedId);
            }
            // Open episode in new tab
            window.open(`/episode/${episodeId}/download`, '_blank');
        }

        async function pollDownloadProgress() {
            if (downloadingEpisodes.size === 0) return;
            
            try {
                const response = await fetch('/api/download-progress');
                const progress = await response.json();
                
                const completedDownloads = [];
                let needsUpdate = false;
                
                for (const [episodeId, data] of downloadingEpisodes.entries()) {
                    if (progress[episodeId]) {
                        const newProgress = progress[episodeId].progress;
                        if (data.progress !== newProgress) {
                            downloadingEpisodes.set(episodeId, {
                                ...data,
                                progress: newProgress,
                                hasStarted: true
                            });
                            needsUpdate = true;
                        }
                    } else if (data.hasStarted) {
                        // Only mark as complete if it was previously tracked and now disappeared
                        completedDownloads.push(episodeId);
                    }
                }
                
                for (const episodeId of completedDownloads) {
                    const data = downloadingEpisodes.get(episodeId);
                    downloadingEpisodes.delete(episodeId);
                    showToast('Episode downloaded!', 'success');
                    if (data.feedId) {
                        await loadFeedDetails(data.feedId);
                    }
                }
                
                // Only re-render if progress actually changed
                if (needsUpdate && downloadingEpisodes.size > 0) {
                    updateProgressIndicators();
                }
            } catch (error) {
                console.error('Error polling progress:', error);
            }
        }

        function updateProgressIndicators() {
            // Update progress indicators without full re-render to preserve scroll
            for (const [episodeId, data] of downloadingEpisodes.entries()) {
                const progressElements = document.querySelectorAll(`[data-episode-id="${episodeId}"]`);
                progressElements.forEach(elem => {
                    const progressText = elem.querySelector('.progress-text');
                    if (progressText) {
                        progressText.textContent = `${data.progress}%`;
                    }
                    const progressCircle = elem.querySelector('.progress-circle');
                    if (progressCircle) {
                        const circumference = 100.53;
                        const dashArray = (data.progress * circumference / 100);
                        progressCircle.setAttribute('stroke-dasharray', `${dashArray} ${circumference}`);
                    }
                });
            }
        }

        setInterval(pollDownloadProgress, 500);

        function copyRSSUrl(feedId) {
            const url = `${window.location.origin}/feed/${feedId}/rss.xml`;
            navigator.clipboard.writeText(url);
            showToast('RSS URL copied to clipboard!', 'success');
        }

        function renderFeeds() {
            const container = document.getElementById('feedsList');
            
            // Save scroll position
            const scrollTop = container.scrollTop;
            
            if (feeds.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 text-gray-500">
                        <i data-lucide="rss" class="w-16 h-16 mx-auto mb-4 opacity-50"></i>
                        <p>No feeds yet. Add one above to get started!</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            container.innerHTML = feeds.map(feed => `
                <div class="bg-white rounded-lg shadow-md overflow-hidden">
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-4">
                            <div class="flex-1">
                                <h3 class="text-xl font-semibold mb-1">${escapeHtml(feed.title || 'Untitled Feed')}</h3>
                                <p class="text-sm text-gray-600 mb-2">${escapeHtml(feed.description || '')}</p>
                                <p class="text-xs text-gray-400">${feed.original_url}</p>
                            </div>
                            ${feed.image_url ? `<img src="${feed.image_url}" alt="Podcast cover" class="w-20 h-20 rounded-lg ml-4">` : ''}
                        </div>
                        
                        <div class="flex gap-2 flex-wrap">
                            <button onclick="toggleFeed(${feed.id})" class="px-3 py-1 bg-gray-100 text-gray-700 rounded hover:bg-gray-200 transition flex items-center gap-1 text-sm">
                                <i data-lucide="${feed.episodes ? 'chevron-up' : 'chevron-down'}" class="w-4 h-4"></i>
                                ${feed.episodes ? 'Hide' : 'Show'} Episodes
                            </button>
                            <button onclick="syncFeed(${feed.id})" class="px-3 py-1 bg-blue-100 text-blue-700 rounded hover:bg-blue-200 transition flex items-center gap-1 text-sm">
                                <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                                Sync
                            </button>
                            <button onclick="copyRSSUrl(${feed.id})" class="px-3 py-1 bg-green-100 text-green-700 rounded hover:bg-green-200 transition flex items-center gap-1 text-sm">
                                <i data-lucide="copy" class="w-4 h-4"></i>
                                Copy RSS URL
                            </button>
                            <button onclick="deleteFeed(${feed.id})" class="px-3 py-1 bg-red-100 text-red-700 rounded hover:bg-red-200 transition flex items-center gap-1 text-sm">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                                Delete
                            </button>
                        </div>
                    </div>
                    
                    ${feed.episodes ? `
                        <div class="border-t border-gray-200 bg-gray-50 p-4">
                            <h4 class="font-semibold mb-3">Episodes (${feed.episodes.length})</h4>
                            <div class="space-y-2 max-h-96 overflow-y-auto">
                                ${feed.episodes.map(ep => `
                                    <div class="bg-white p-3 rounded border border-gray-200 flex justify-between items-center">
                                        <div class="flex-1 min-w-0">
                                            <p class="font-medium text-sm truncate">${escapeHtml(ep.title || 'Untitled Episode')}</p>
                                            <p class="text-xs text-gray-500">${ep.pub_date || 'No date'} ${ep.duration ? '• ' + ep.duration : ''}</p>
                                        </div>
                                        <div class="flex gap-2 ml-4">
                                            ${ep.downloaded ? 
                                                `<span class="px-2 py-1 bg-green-100 text-green-700 rounded text-xs flex items-center gap-1">
                                                    <i data-lucide="check" class="w-3 h-3"></i>
                                                    Cached
                                                </span>` :
                                                (downloadingEpisodes.has(ep.id) ?
                                                    `<span class="px-2 py-1 bg-blue-100 text-blue-700 rounded text-xs flex items-center gap-1" data-episode-id="${ep.id}">
                                                        <svg class="w-4 h-4" viewBox="0 0 36 36">
                                                            <circle cx="18" cy="18" r="16" fill="none" stroke="currentColor" stroke-width="3" opacity="0.25"></circle>
                                                            <circle class="progress-circle" cx="18" cy="18" r="16" fill="none" stroke="currentColor" stroke-width="3" 
                                                                stroke-dasharray="${downloadingEpisodes.get(ep.id).progress * 100.53 / 100} 100.53"
                                                                stroke-linecap="round" transform="rotate(-90 18 18)"></circle>
                                                        </svg>
                                                        <span class="progress-text">${downloadingEpisodes.get(ep.id).progress}%</span>
                                                    </span>` :
                                                    `<button onclick="downloadEpisode(${ep.id}, ${feed.id})" class="px-2 py-1 bg-blue-100 text-blue-700 rounded hover:bg-blue-200 text-xs flex items-center gap-1">
                                                        <i data-lucide="download" class="w-3 h-3"></i>
                                                        Download
                                                    </button>`)
                                            }
                                            <button onclick="playEpisode(${ep.id}, ${feed.id})" class="px-2 py-1 bg-gray-100 text-gray-700 rounded hover:bg-gray-200 text-xs flex items-center gap-1">
                                                <i data-lucide="play" class="w-3 h-3"></i>
                                                Play
                                            </button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    ` : ''}
                </div>
            `).join('');
            
            lucide.createIcons();
            
            // Restore scroll position
            container.scrollTop = scrollTop;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            
            toastMessage.textContent = message;
            toast.classList.remove('hidden', 'bg-gray-900', 'bg-red-600', 'bg-green-600');
            
            if (type === 'error') toast.classList.add('bg-red-600');
            else if (type === 'success') toast.classList.add('bg-green-600');
            else toast.classList.add('bg-gray-900');
            
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        document.getElementById('feedUrl').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addFeed();
        });

        loadConfig();
        loadFeeds();
        lucide.createIcons();
    </script>
</body>
</html>
