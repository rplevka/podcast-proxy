<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podcast RSS Proxy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <header class="mb-8 flex justify-between items-start">
            <div>
                <h1 class="text-4xl font-bold text-gray-900 mb-2">Podcast RSS Proxy</h1>
                <p class="text-gray-600">Manage and cache your podcast feeds</p>
            </div>
            <div id="authSection">
                <!-- Auth UI will be rendered here -->
            </div>
        </header>

        <div id="addFeedSection" class="bg-white rounded-lg shadow-md p-6 mb-6" style="display: none;">
            <h2 class="text-xl font-semibold mb-4">Add New Feed</h2>
            <div class="space-y-3">
                <div class="flex gap-2">
                    <input 
                        type="url" 
                        id="feedUrl" 
                        placeholder="Enter RSS feed URL..." 
                        class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    />
                </div>
                <div class="flex gap-2">
                    <input 
                        type="number" 
                        id="feedPrice" 
                        placeholder="Price (optional)" 
                        step="0.01"
                        class="w-32 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    />
                    <select 
                        id="feedCurrency" 
                        class="w-24 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                    >
                        <option value="CZK">CZK</option>
                        <option value="USD">USD</option>
                        <option value="EUR">EUR</option>
                        <option value="GBP">GBP</option>
                    </select>
                    <button 
                        onclick="addFeed()" 
                        class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition flex items-center gap-2"
                    >
                        <i data-lucide="plus" class="w-4 h-4"></i>
                        Add Feed
                    </button>
                </div>
            </div>
        </div>

        <div class="mb-4">
            <h2 class="text-2xl font-semibold">Feed Library</h2>
        </div>

        <div id="feedsList" class="space-y-4">
            <div class="text-center py-12 text-gray-500">
                <i data-lucide="rss" class="w-16 h-16 mx-auto mb-4 opacity-50"></i>
                <p>No feeds yet. Add one above to get started!</p>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-4 right-4 bg-gray-900 text-white px-6 py-3 rounded-lg shadow-lg hidden transition-opacity">
        <p id="toastMessage"></p>
    </div>


    <!-- Admin Panel Modal -->
    <div id="adminModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden z-50">
        <div class="bg-white rounded-lg p-8 max-w-2xl w-full mx-4 max-h-[80vh] overflow-y-auto">
            <h2 class="text-2xl font-bold mb-6">Admin Panel</h2>
            <div class="space-y-6">
                <div>
                    <h3 class="text-lg font-semibold mb-3">System Management</h3>
                    <div class="flex gap-2 mb-4">
                        <button 
                            onclick="cleanupDatabase()" 
                            class="px-4 py-2 bg-orange-600 text-white rounded-lg hover:bg-orange-700 transition flex items-center gap-2"
                        >
                            <i data-lucide="database" class="w-4 h-4"></i>
                            Cleanup DB
                        </button>
                        <button 
                            onclick="syncAll()" 
                            class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition flex items-center gap-2"
                        >
                            <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                            Sync All
                        </button>
                    </div>
                </div>
                <div>
                    <h3 class="text-lg font-semibold mb-3">Generate Invitation Link</h3>
                    <div class="flex gap-2 items-end">
                        <div class="flex-1">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Role</label>
                            <select 
                                id="invitationRole" 
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                            >
                                <option value="user">User (Read-only)</option>
                                <option value="poweruser">Poweruser (Can add feeds)</option>
                                <option value="admin">Admin (Full access)</option>
                            </select>
                        </div>
                        <button 
                            onclick="generateInvitation()" 
                            class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition flex items-center gap-2"
                        >
                            <i data-lucide="plus" class="w-4 h-4"></i>
                            Create Invitation
                        </button>
                    </div>
                </div>
                <div>
                    <h3 class="text-lg font-semibold mb-3">Invitation Links</h3>
                    <div id="invitationsList" class="space-y-2">
                        <!-- Invitations will be rendered here -->
                    </div>
                </div>
                <button 
                    onclick="closeAdminModal()" 
                    class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition"
                >
                    Close
                </button>
            </div>
        </div>
    </div>

    <script>
        let feeds = [];
        let baseUrl = window.location.origin;
        let currentUser = null;

        async function loadConfig() {
            try {
                const response = await fetch('/api/config');
                const config = await response.json();
                baseUrl = config.base_url;
            } catch (error) {
                console.error('Error loading config:', error);
            }
        }

        async function loadFeeds() {
            try {
                const response = await fetch('/api/feeds');
                feeds = await response.json();
                renderFeeds();
            } catch (error) {
                showToast('Error loading feeds: ' + error.message, 'error');
            }
        }

        async function checkAuth() {
            try {
                const response = await fetch('/api/auth/me');
                if (response.ok) {
                    currentUser = await response.json();
                    renderAuthSection();
                    updateUIForAuth();
                } else {
                    currentUser = null;
                    renderAuthSection();
                    updateUIForAuth();
                }
            } catch (error) {
                currentUser = null;
                renderAuthSection();
                updateUIForAuth();
            }
        }

        function renderAuthSection() {
            const authSection = document.getElementById('authSection');
            
            if (currentUser) {
                authSection.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="text-right">
                            <p class="text-sm font-medium text-gray-900">${escapeHtml(currentUser.username)}</p>
                            <p class="text-xs text-gray-500">${currentUser.role}</p>
                        </div>
                        ${currentUser.role === 'admin' ? `
                            <button 
                                onclick="openAdminModal()" 
                                class="px-3 py-1 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition text-sm flex items-center gap-1"
                            >
                                <i data-lucide="shield" class="w-4 h-4"></i>
                                Admin
                            </button>
                        ` : ''}
                        <button 
                            onclick="logout()" 
                            class="px-3 py-1 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition text-sm flex items-center gap-1"
                        >
                            <i data-lucide="log-out" class="w-4 h-4"></i>
                            Logout
                        </button>
                    </div>
                `;
            }
            lucide.createIcons();
        }

        function updateUIForAuth() {
            const addFeedSection = document.getElementById('addFeedSection');
            if (currentUser && (currentUser.role === 'poweruser' || currentUser.role === 'admin')) {
                addFeedSection.style.display = 'block';
            } else {
                addFeedSection.style.display = 'none';
            }
        }


        async function logout() {
            try {
                await fetch('/api/auth/logout', { method: 'POST' });
                window.location.href = '/login';
            } catch (error) {
                showToast('Error logging out: ' + error.message, 'error');
            }
        }

        function openAdminModal() {
            document.getElementById('adminModal').classList.remove('hidden');
            loadInvitations();
        }

        function closeAdminModal() {
            document.getElementById('adminModal').classList.add('hidden');
        }

        async function generateInvitation() {
            const role = document.getElementById('invitationRole').value;
            
            try {
                const response = await fetch('/api/invitations', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ role })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Failed to create invitation');
                }

                showToast('Invitation created!', 'success');
                await loadInvitations();
            } catch (error) {
                showToast('Error: ' + error.message, 'error');
            }
        }

        async function loadInvitations() {
            try {
                const response = await fetch('/api/invitations');
                const invitations = await response.json();
                
                const container = document.getElementById('invitationsList');
                if (invitations.length === 0) {
                    container.innerHTML = '<p class="text-gray-500 text-sm">No invitations yet</p>';
                } else {
                    container.innerHTML = invitations.map(inv => `
                        <div class="bg-gray-50 p-3 rounded border border-gray-200">
                            <div class="flex justify-between items-start">
                                <div class="flex-1 min-w-0">
                                    <div class="flex items-center gap-2 mb-1">
                                        <p class="text-xs font-mono text-gray-600 break-all">${inv.token}</p>
                                        <span class="px-2 py-0.5 bg-blue-100 text-blue-700 rounded text-xs font-medium">${inv.role}</span>
                                    </div>
                                    <p class="text-xs text-gray-500">
                                        ${inv.used ? `Used by user #${inv.used_by}` : 'Not used yet'}
                                    </p>
                                </div>
                                ${!inv.used ? `
                                    <button 
                                        onclick="copyInvitationUrl('${inv.token}')" 
                                        class="ml-2 px-2 py-1 bg-blue-100 text-blue-700 rounded hover:bg-blue-200 text-xs flex items-center gap-1"
                                    >
                                        <i data-lucide="copy" class="w-3 h-3"></i>
                                        Copy
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    `).join('');
                    lucide.createIcons();
                }
            } catch (error) {
                showToast('Error loading invitations: ' + error.message, 'error');
            }
        }

        function copyToClipboard(text, event) {
            if (event) event.stopPropagation();
            
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('Copied to clipboard!', 'success');
                }).catch(err => {
                    console.error('Failed to copy:', err);
                    showToast('Failed to copy to clipboard', 'error');
                });
            } else {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    showToast('Copied to clipboard!', 'success');
                } catch (err) {
                    console.error('Failed to copy:', err);
                    showToast('Failed to copy to clipboard', 'error');
                }
                document.body.removeChild(textarea);
            }
        }

        function copyInvitationUrl(token) {
            const url = `${window.location.origin}/register?token=${token}`;
            
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(url)
                    .then(() => showToast('Invitation URL copied!', 'success'))
                    .catch(() => showToast('Failed to copy', 'error'));
            } else {
                showToast('Failed to copy', 'error');
            }
        }

        async function addFeed() {
            const url = document.getElementById('feedUrl').value.trim();
            const priceInput = document.getElementById('feedPrice').value.trim();
            const currency = document.getElementById('feedCurrency').value;
            
            if (!url) {
                showToast('Please enter a feed URL', 'error');
                return;
            }

            const body = { url };
            if (priceInput) {
                body.price = parseFloat(priceInput);
                body.currency = currency;
            }

            try {
                const response = await fetch('/api/feeds', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Failed to add feed');
                }

                document.getElementById('feedUrl').value = '';
                document.getElementById('feedPrice').value = '';
                showToast('Feed added successfully!', 'success');
                await loadFeeds();
            } catch (error) {
                showToast('Error: ' + error.message, 'error');
            }
        }

        async function deleteFeed(feedId) {
            if (!confirm('Are you sure you want to delete this feed?')) return;

            try {
                await fetch(`/api/feeds/${feedId}`, { method: 'DELETE' });
                showToast('Feed deleted', 'success');
                await loadFeeds();
            } catch (error) {
                showToast('Error deleting feed: ' + error.message, 'error');
            }
        }

        async function syncFeed(feedId) {
            try {
                const response = await fetch(`/api/feeds/${feedId}/sync`, { method: 'POST' });
                const result = await response.json();
                
                if (result.success) {
                    showToast(`Synced ${result.episode_count} episodes`, 'success');
                    await loadFeedDetails(feedId);
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                showToast('Error syncing: ' + error.message, 'error');
            }
        }

        function editFeedUrl(feedId, currentUrl) {
            const container = document.getElementById(`feed-url-${feedId}`);
            if (!container) return;
            
            container.innerHTML = `
                <span class="font-medium">Original:</span>
                <input 
                    type="url" 
                    id="feed-url-input-${feedId}" 
                    value="${escapeHtml(currentUrl)}"
                    class="flex-1 px-2 py-1 border border-gray-300 rounded text-xs focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
                <button onclick="updateFeedUrl(${feedId})" class="px-2 py-1 bg-green-100 text-green-700 rounded hover:bg-green-200 flex items-center gap-1">
                    <i data-lucide="check" class="w-3 h-3"></i>
                    Update
                </button>
                <button onclick="cancelEditFeedUrl(${feedId}, '${currentUrl.replace(/'/g, "\\'")}'))" class="px-2 py-1 bg-gray-100 text-gray-600 rounded hover:bg-gray-200 flex items-center gap-1">
                    <i data-lucide="x" class="w-3 h-3"></i>
                    Cancel
                </button>
            `;
            lucide.createIcons();
            document.getElementById(`feed-url-input-${feedId}`).focus();
        }

        function cancelEditFeedUrl(feedId, originalUrl) {
            const container = document.getElementById(`feed-url-${feedId}`);
            if (!container) return;
            
            container.innerHTML = `
                <span class="font-medium">Original:</span>
                <span class="truncate" id="feed-url-display-${feedId}">${originalUrl}</span>
                ${(currentUser && (currentUser.id === feeds.find(f => f.id === feedId)?.owner_id || currentUser.role === 'admin')) ? `
                    <button onclick="editFeedUrl(${feedId}, '${originalUrl.replace(/'/g, "\\'")}')" class="px-2 py-1 bg-gray-100 text-gray-600 rounded hover:bg-gray-200 flex items-center gap-1">
                        <i data-lucide="edit-2" class="w-3 h-3"></i>
                        Edit
                    </button>
                ` : ''}
            `;
            lucide.createIcons();
        }

        async function updateFeedUrl(feedId) {
            const input = document.getElementById(`feed-url-input-${feedId}`);
            if (!input) return;
            
            const newUrl = input.value.trim();
            if (!newUrl) {
                showToast('URL cannot be empty', 'error');
                return;
            }
            
            try {
                const response = await fetch(`/api/feeds/${feedId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: newUrl })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Failed to update feed URL');
                }
                
                showToast('Feed URL updated, syncing...', 'success');
                
                // Reload feeds to get updated data
                await loadFeeds();
            } catch (error) {
                showToast('Error: ' + error.message, 'error');
            }
        }

        async function cleanupDatabase() {
            try {
                const response = await fetch('/api/cleanup', { method: 'POST' });
                const result = await response.json();
                
                if (result.success) {
                    showToast(`Cleaned ${result.cleaned} of ${result.checked} episodes`, 'success');
                    await loadFeeds();
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                showToast('Error cleaning database: ' + error.message, 'error');
            }
        }

        async function syncAll() {
            try {
                const response = await fetch('/api/sync-all', { method: 'POST' });
                const results = await response.json();
                const successful = results.filter(r => r.success).length;
                showToast(`Synced ${successful} of ${results.length} feeds`, 'success');
                await loadFeeds();
            } catch (error) {
                showToast('Error syncing: ' + error.message, 'error');
            }
        }

        async function loadFeedDetails(feedId) {
            try {
                const response = await fetch(`/api/feeds/${feedId}`);
                const feed = await response.json();
                const index = feeds.findIndex(f => f.id === feedId);
                if (index !== -1) {
                    feeds[index] = feed;
                    renderFeeds();
                }
            } catch (error) {
                console.error('Error loading feed details:', error);
            }
        }

        async function toggleFeed(feedId) {
            const feed = feeds.find(f => f.id === feedId);
            if (!feed.episodes) {
                await loadFeedDetails(feedId);
            } else {
                feed.episodes = null;
                renderFeeds();
            }
        }

        const downloadingEpisodes = new Map();

        async function downloadEpisode(episodeId, feedId) {
            if (downloadingEpisodes.has(episodeId)) return;
            
            downloadingEpisodes.set(episodeId, { 
                progress: 0, 
                feedId,
                startTime: Date.now(),
                hasStarted: false
            });
            
            // Update button to show initial progress without full re-render
            const downloadButton = document.querySelector(`button[onclick="downloadEpisode(${episodeId}, ${feedId})"]`);
            if (downloadButton) {
                downloadButton.outerHTML = `<span class="px-2 py-1 bg-blue-100 text-blue-700 rounded text-xs flex items-center gap-1" data-episode-id="${episodeId}">
                    <svg class="w-4 h-4" viewBox="0 0 36 36">
                        <circle cx="18" cy="18" r="16" fill="none" stroke="currentColor" stroke-width="3" opacity="0.25"></circle>
                        <circle class="progress-circle" cx="18" cy="18" r="16" fill="none" stroke="currentColor" stroke-width="3" 
                            stroke-dasharray="0 100.53"
                            stroke-linecap="round" transform="rotate(-90 18 18)"></circle>
                    </svg>
                    <span class="progress-text">0%</span>
                </span>`;
            }
            
            try {
                const response = await fetch(`/api/episodes/${episodeId}/download`, { method: 'POST' });
                const result = await response.json();
                
                if (!result.success) {
                    throw new Error(result.error);
                }
            } catch (error) {
                downloadingEpisodes.delete(episodeId);
                showToast('Error downloading: ' + error.message, 'error');
                renderFeeds();
            }
        }

        async function playEpisode(episodeId, feedId) {
            // Trigger download with progress tracking, then open episode
            if (!downloadingEpisodes.has(episodeId)) {
                await downloadEpisode(episodeId, feedId);
            }
            // Open episode in new tab
            window.open(`/episode/${episodeId}/download`, '_blank');
        }

        async function pollDownloadProgress() {
            if (downloadingEpisodes.size === 0) return;
            
            try {
                const response = await fetch('/api/download-progress');
                const progress = await response.json();
                
                const completedDownloads = [];
                let needsUpdate = false;
                
                for (const [episodeId, data] of downloadingEpisodes.entries()) {
                    if (progress[episodeId]) {
                        const newProgress = progress[episodeId].progress;
                        if (data.progress !== newProgress) {
                            downloadingEpisodes.set(episodeId, {
                                ...data,
                                progress: newProgress,
                                hasStarted: true
                            });
                            needsUpdate = true;
                        }
                    } else if (data.hasStarted) {
                        // Only mark as complete if it was previously tracked and now disappeared
                        completedDownloads.push(episodeId);
                    }
                }
                
                for (const episodeId of completedDownloads) {
                    const data = downloadingEpisodes.get(episodeId);
                    downloadingEpisodes.delete(episodeId);
                    showToast('Episode downloaded!', 'success');
                    if (data.feedId) {
                        await loadFeedDetails(data.feedId);
                    }
                }
                
                // Only re-render if progress actually changed
                if (needsUpdate && downloadingEpisodes.size > 0) {
                    updateProgressIndicators();
                }
            } catch (error) {
                console.error('Error polling progress:', error);
            }
        }

        function updateProgressIndicators() {
            // Update progress indicators without full re-render to preserve scroll
            for (const [episodeId, data] of downloadingEpisodes.entries()) {
                const progressElements = document.querySelectorAll(`[data-episode-id="${episodeId}"]`);
                progressElements.forEach(elem => {
                    const progressText = elem.querySelector('.progress-text');
                    if (progressText) {
                        progressText.textContent = `${data.progress}%`;
                    }
                    const progressCircle = elem.querySelector('.progress-circle');
                    if (progressCircle) {
                        const circumference = 100.53;
                        const dashArray = (data.progress * circumference / 100);
                        progressCircle.setAttribute('stroke-dasharray', `${dashArray} ${circumference}`);
                    }
                });
            }
        }

        setInterval(pollDownloadProgress, 500);

        function copyRSSUrl(feedId) {
            const url = `${window.location.origin}/feed/${feedId}/rss.xml`;
            
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(url)
                    .then(() => showToast('RSS URL copied to clipboard!', 'success'))
                    .catch(() => fallbackCopy(url));
            } else {
                fallbackCopy(url);
            }
        }

        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            
            try {
                document.execCommand('copy');
                showToast('RSS URL copied to clipboard!', 'success');
            } catch (err) {
                showToast('Failed to copy. Please copy manually.', 'error');
            }
            
            document.body.removeChild(textarea);
        }

        function renderFeeds() {
            const container = document.getElementById('feedsList');
            
            // Save scroll position
            const scrollTop = container.scrollTop;
            
            if (feeds.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 text-gray-500">
                        <i data-lucide="rss" class="w-16 h-16 mx-auto mb-4 opacity-50"></i>
                        <p>No feeds yet. Add one above to get started!</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            container.innerHTML = feeds.map(feed => `
                <div class="bg-white rounded-lg shadow-md overflow-hidden">
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-4">
                            <div class="flex-1">
                                <h3 class="text-xl font-semibold mb-1">${escapeHtml(feed.title || 'Untitled Feed')}</h3>
                                <p class="text-sm text-gray-600 mb-2">${escapeHtml(feed.description || '')}</p>
                                <div class="flex flex-col gap-2 text-xs">
                                    ${feed.proxy_url ? `
                                        <div class="flex items-center gap-2">
                                            <span class="text-gray-500 font-medium">Proxy URL:</span>
                                            <code class="px-2 py-1 bg-blue-50 text-blue-700 rounded text-xs font-mono flex-1 truncate">${feed.proxy_url}</code>
                                            <button onclick="copyToClipboard('${feed.proxy_url.replace(/'/g, "\\'")}', event)" class="px-2 py-1 bg-blue-100 text-blue-700 rounded hover:bg-blue-200 flex items-center gap-1">
                                                <i data-lucide="copy" class="w-3 h-3"></i>
                                                Copy
                                            </button>
                                        </div>
                                    ` : ''}
                                    ${feed.original_url ? `
                                        <div class="flex items-center gap-2 text-gray-400" id="feed-url-${feed.id}">
                                            <span class="font-medium">Original:</span>
                                            <span class="truncate" id="feed-url-display-${feed.id}">${feed.original_url}</span>
                                            ${(currentUser && (currentUser.id === feed.owner_id || currentUser.role === 'admin')) ? `
                                                <button onclick="editFeedUrl(${feed.id}, '${feed.original_url.replace(/'/g, "\\'")}')", event)" class="px-2 py-1 bg-gray-100 text-gray-600 rounded hover:bg-gray-200 flex items-center gap-1">
                                                    <i data-lucide="edit-2" class="w-3 h-3"></i>
                                                    Edit
                                                </button>
                                            ` : ''}
                                        </div>
                                    ` : ''}
                                    <div class="flex items-center gap-3">
                                        ${feed.owner_username ? (
                                            currentUser && currentUser.id === feed.owner_id 
                                                ? `<span class="px-2 py-0.5 bg-blue-100 text-blue-700 rounded font-medium">Owner: you</span>`
                                                : `<span class="px-2 py-0.5 bg-gray-100 text-gray-600 rounded">Owner: ${escapeHtml(feed.owner_username)}</span>`
                                        ) : ''}
                                        ${feed.price ? `<span class="px-2 py-0.5 bg-green-100 text-green-700 rounded font-medium">${feed.currency} ${feed.price}</span>` : ''}
                                    </div>
                                </div>
                            </div>
                            ${feed.image_url ? `<img src="${feed.image_url}" alt="Podcast cover" class="w-20 h-20 rounded-lg ml-4">` : ''}
                        </div>
                        
                        <div class="flex gap-2 flex-wrap">
                            <button onclick="toggleFeed(${feed.id})" class="px-3 py-1 bg-gray-100 text-gray-700 rounded hover:bg-gray-200 transition flex items-center gap-1 text-sm">
                                <i data-lucide="${feed.episodes ? 'chevron-up' : 'chevron-down'}" class="w-4 h-4"></i>
                                ${feed.episodes ? 'Hide' : 'Show'} Episodes
                            </button>
                            ${currentUser && (currentUser.role === 'admin' || currentUser.id === feed.owner_id) ? `
                                <button onclick="syncFeed(${feed.id})" class="px-3 py-1 bg-blue-100 text-blue-700 rounded hover:bg-blue-200 transition flex items-center gap-1 text-sm">
                                    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                                    Sync
                                </button>
                                <button onclick="deleteFeed(${feed.id})" class="px-3 py-1 bg-red-100 text-red-700 rounded hover:bg-red-200 transition flex items-center gap-1 text-sm">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                    Delete
                                </button>
                            ` : ''}
                        </div>
                    </div>
                    
                    ${feed.episodes ? `
                        <div class="border-t border-gray-200 bg-gray-50 p-4">
                            <h4 class="font-semibold mb-3">Episodes (${feed.episodes.length})</h4>
                            <div class="space-y-2 max-h-96 overflow-y-auto">
                                ${feed.episodes.map(ep => `
                                    <div class="bg-white p-3 rounded border border-gray-200 flex justify-between items-center">
                                        <div class="flex-1 min-w-0">
                                            <p class="font-medium text-sm truncate">${escapeHtml(ep.title || 'Untitled Episode')}</p>
                                            <p class="text-xs text-gray-500">${ep.pub_date || 'No date'} ${ep.duration ? '• ' + ep.duration : ''}</p>
                                        </div>
                                        <div class="flex gap-2 ml-4">
                                            ${ep.downloaded ? 
                                                `<span class="px-2 py-1 bg-green-100 text-green-700 rounded text-xs flex items-center gap-1">
                                                    <i data-lucide="check" class="w-3 h-3"></i>
                                                    Cached
                                                </span>` :
                                                (downloadingEpisodes.has(ep.id) ?
                                                    `<span class="px-2 py-1 bg-blue-100 text-blue-700 rounded text-xs flex items-center gap-1" data-episode-id="${ep.id}">
                                                        <svg class="w-4 h-4" viewBox="0 0 36 36">
                                                            <circle cx="18" cy="18" r="16" fill="none" stroke="currentColor" stroke-width="3" opacity="0.25"></circle>
                                                            <circle class="progress-circle" cx="18" cy="18" r="16" fill="none" stroke="currentColor" stroke-width="3" 
                                                                stroke-dasharray="${downloadingEpisodes.get(ep.id).progress * 100.53 / 100} 100.53"
                                                                stroke-linecap="round" transform="rotate(-90 18 18)"></circle>
                                                        </svg>
                                                        <span class="progress-text">${downloadingEpisodes.get(ep.id).progress}%</span>
                                                    </span>` :
                                                    `<button onclick="downloadEpisode(${ep.id}, ${feed.id})" class="px-2 py-1 bg-blue-100 text-blue-700 rounded hover:bg-blue-200 text-xs flex items-center gap-1">
                                                        <i data-lucide="download" class="w-3 h-3"></i>
                                                        Download
                                                    </button>`)
                                            }
                                            <button onclick="playEpisode(${ep.id}, ${feed.id})" class="px-2 py-1 bg-gray-100 text-gray-700 rounded hover:bg-gray-200 text-xs flex items-center gap-1">
                                                <i data-lucide="play" class="w-3 h-3"></i>
                                                Play
                                            </button>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    ` : ''}
                </div>
            `).join('');
            
            lucide.createIcons();
            
            // Restore scroll position
            container.scrollTop = scrollTop;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            
            toastMessage.textContent = message;
            toast.classList.remove('hidden', 'bg-gray-900', 'bg-red-600', 'bg-green-600');
            
            if (type === 'error') toast.classList.add('bg-red-600');
            else if (type === 'success') toast.classList.add('bg-green-600');
            else toast.classList.add('bg-gray-900');
            
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        document.getElementById('feedUrl').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addFeed();
        });


        checkAuth();
        loadConfig();
        loadFeeds();
        lucide.createIcons();
    </script>
</body>
</html>
